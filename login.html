<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus | Executive Node Protocol</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { theme: { extend: { fontFamily: { sans: ['Inter'], mono: ['JetBrains Mono'] }, colors: { app: { base: '#000', card: '#050505', border: 'rgba(255,255,255,0.08)' } } } } }
    </script>
</head>
<body class="bg-[#000] text-zinc-300 font-sans min-h-screen flex items-center justify-center selection:bg-blue-500/40 relative">
    
    <a href="index.html" class="absolute top-6 left-8 text-xs font-mono font-bold uppercase tracking-widest text-zinc-600 hover:text-white transition group z-20">
        <i class="fa-solid fa-arrow-left mr-2"></i> Ecom Live Feed
    </a>

    <div class="relative w-full max-w-sm px-4">
        <!-- Floating blue backlight logic CSS CSS component syntax mapping HTML markup HTML syntax map layout variables UI CSS HTML setup components logic styling setup list flex -->
        <div class="absolute -inset-1 bg-gradient-to-r from-blue-900 to-indigo-900 rounded-[1.2rem] blur-[30px] opacity-40 pointer-events-none"></div>

        <div class="relative bg-app-card border border-app-border rounded-xl p-8 shadow-2xl backdrop-blur-md text-center overflow-hidden relative">
            
            <div id="errorPingAlertContainerStructHTMLValueDOM" class="absolute top-0 left-0 right-0 bg-red-600 text-white font-mono text-[9px] font-bold uppercase py-1 shadow-lg hidden">DENIED. Unrecognized Hierarchy Route.</div>

            <i class="fa-solid fa-user-shield text-3xl text-white/50 mb-4 inline-block drop-shadow-[0_0_15px_rgba(255,255,255,0.3)]"></i>
            <h2 class="text-xl font-bold text-white tracking-tight mb-1">E-Commerce Top Level Admin</h2>
            <p class="text-[10px] text-zinc-500 font-mono tracking-widest mb-6">Database Management Authority Login</p>

            <form id="topLevelAccessLogControlObject" class="space-y-4 text-left">
                <div>
                    <input id="u_admin" type="email" placeholder="admin@nexus.io" class="w-full bg-[#111] border border-white/10 text-white text-xs font-mono p-3 rounded outline-none focus:border-white focus:bg-black transition-all text-center placeholder-zinc-700 tracking-wide" value="admin@nexus.io">
                </div>
                <div>
                    <input id="u_key" type="password" placeholder="admin" class="w-full bg-[#111] border border-white/10 text-white text-xs font-mono p-3 rounded outline-none focus:border-white focus:bg-black transition-all text-center tracking-widest" value="admin">
                </div>
                <button type="submit" id="unlockRouteDOM" class="w-full bg-white text-black py-3 text-xs font-bold font-mono rounded hover:opacity-80 transition mt-2 flex justify-center items-center shadow shadow-white/10"><i class="fa-solid fa-unlock text-[10px] mr-2 text-zinc-700"></i> OVERRIDE ENCRYPTION</button>
            </form>
            <div class="mt-6 flex items-center justify-center font-mono text-[8px] text-zinc-700 tracking-[0.2em]">CONNECTION ESTABLISHED WITH SERVER ROOT. <div class="w-1.5 h-1.5 bg-blue-500 rounded-full animate-ping ml-2"></div></div>
        </div>
    </div>

    <script>
        document.getElementById('topLevelAccessLogControlObject').addEventListener('submit', (e) => {
             e.preventDefault();
             if(document.getElementById('u_admin').value === 'admin@nexus.io' && document.getElementById('u_key').value === 'admin') {
                  const nodeSubStringCSSStrBtnVal = document.getElementById('unlockRouteDOM');
                  nodeSubStringCSSStrBtnVal.innerHTML = '<i class="fa-solid fa-cog fa-spin mr-2"></i> PIPELINING DB REPOSITORY';
                  nodeSubStringCSSStrBtnVal.classList.add('cursor-wait');
                  setTimeout(() => { localStorage.setItem('auth_store_admin_layer', 'verified_token_root'); window.location.href = 'admin.html'; }, 900);
             } else {
                  document.getElementById('errorPingAlertContainerStructHTMLValueDOM').classList.remove('hidden');
                  setTimeout(()=>document.getElementById('errorPingAlertContainerStructHTMLValueDOM').classList.add('hidden'), 2000);
             }
        });
    </script>
</body>
</html>
