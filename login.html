<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus | Authenticate</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Tailwind Configuration -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'], mono: ['JetBrains Mono', 'monospace'], },
                    colors: {
                        app: { base: '#000000', card: '#09090b', border: 'rgba(255,255,255,0.08)' }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-[radial-gradient(ellipse_at_top,_var(--tw-gradient-stops))] from-blue-900/10 via-app-base to-app-base text-zinc-300 font-sans min-h-screen flex items-center justify-center selection:bg-blue-500 selection:text-white">
    
    <!-- Header -->
    <a href="index.html" class="absolute top-6 left-8 flex items-center text-sm font-medium text-zinc-400 hover:text-white transition-colors group z-20">
        <i class="fa-solid fa-arrow-left-long mr-3 transform group-hover:-translate-x-1 transition-transform"></i> Back to site
    </a>

    <!-- Auth Module / Float center -->
    <div class="relative w-full max-w-sm px-4">
        <!-- Floating highlight block backing -->
        <div class="absolute -inset-1 bg-gradient-to-r from-blue-600/30 to-indigo-600/30 rounded-[1.2rem] blur-xl opacity-20 pointer-events-none"></div>

        <div class="relative bg-app-card border border-app-border rounded-xl shadow-[0_20px_40px_-15px_rgba(0,0,0,0.5)] overflow-hidden">
            <div class="p-8">
                <!-- Branding icon inside modal -->
                <div class="flex justify-center mb-6">
                    <div class="w-12 h-12 flex items-center justify-center bg-white/[0.03] border border-app-border rounded-xl">
                        <i class="fa-solid fa-fingerprint text-xl text-blue-500"></i>
                    </div>
                </div>

                <div class="text-center mb-8">
                    <h2 class="text-xl font-semibold text-white tracking-tight mb-2">Welcome Back</h2>
                    <p class="text-xs text-zinc-400">Secure entry to Nexus Telemetry Systems</p>
                </div>

                <form id="nexusLoginForm" class="space-y-5">
                    <div>
                        <label class="block text-xs font-mono font-medium text-zinc-500 mb-1" for="email">WORKSPACE EMAIL</label>
                        <input id="email" type="email" placeholder="admin@enterprise.io" class="w-full bg-black/50 border border-app-border text-white text-sm rounded-lg p-3 outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500/50 transition-all font-mono" required autocomplete="email">
                    </div>
                    <div>
                        <div class="flex justify-between items-center mb-1">
                            <label class="block text-xs font-mono font-medium text-zinc-500" for="password">SECURE KEY</label>
                        </div>
                        <input id="password" type="password" placeholder="••••••••" class="w-full bg-black/50 border border-app-border text-white text-sm rounded-lg p-3 outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500/50 transition-all font-mono" required autocomplete="current-password">
                    </div>

                    <button type="submit" class="w-full py-3 bg-white text-black font-semibold text-sm rounded-lg hover:bg-zinc-200 transition-colors duration-200 mt-4 shadow-[0_0_20px_rgba(255,255,255,0.1)]">
                        Initialize Session <i class="fa-solid fa-arrow-right-to-bracket ml-2"></i>
                    </button>
                </form>

                <p class="mt-6 text-center text-xs font-mono text-zinc-600">Encrypted AES-256 <i class="fa-solid fa-lock text-[10px]"></i></p>
            </div>
        </div>
    </div>

    <!-- Intercept Auth & Storage Write logic -->
    <script>
        document.getElementById('nexusLoginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Establishing Node...';
            btn.classList.add('opacity-80', 'cursor-not-allowed');

            // Faux validation delay simulating database roundtrip 
            setTimeout(() => {
                // Issue Token into simulated storage securely
                localStorage.setItem('nexus_auth_token', btoa(Date.now().toString()));
                window.location.replace('dashboard.html');
            }, 800);
        });
    </script>
</body>
</html>
