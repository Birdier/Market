<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus | Autoclave</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: { extend: { fontFamily: { sans: ['Inter'], mono: ['JetBrains Mono'] }, colors: { app: { base: '#000000', card: '#09090b', border: 'rgba(255,255,255,0.08)' } } } }
        }

        // DATABASE ENGINE SEED - Run instantly 
        function initializeSystemDb() {
            if (!localStorage.getItem('NEXUS_SYS_DB')) {
                const initData = {
                    baseGross: 214500, activeMargin: 28.4, cac: 29.84, activeNodes: 4, 
                    linkedStores: [ {id: "nd_alpha1", name: "Alpha Flagship Store", type: "Stripe/Custom", revenue: 84000, status: "live", accName: "Jameson Retail"} ],
                    emails: [
                        {id: 'em_sys_0', folder: 'inbox', sender: 'System Architect', subject: 'Node architecture deployment v3', body: 'The recent push to AWS Frankfurt servers holds stability. Ensure clients attach API keys under OAuth2 definitions. Awaiting your approval on gross telemetry models.', read: true, date: 'May 16'}
                    ]
                };
                localStorage.setItem('NEXUS_SYS_DB', JSON.stringify(initData));
            }
        }
        initializeSystemDb();
    </script>
</head>
<body class="bg-[radial-gradient(ellipse_at_top,_var(--tw-gradient-stops))] from-blue-900/10 via-app-base to-app-base text-zinc-300 font-sans min-h-screen flex items-center justify-center antialiased">
    
    <div class="relative w-full max-w-sm px-4">
        <!-- Error Toast (Hidden) -->
        <div id="authErr" class="absolute -top-14 left-0 right-0 hidden items-center justify-center bg-red-500/10 border border-red-500/30 text-red-400 text-xs py-2 rounded-lg font-mono">
            INVALID CREDENTIALS: Unauthorized root.
        </div>

        <div class="absolute -inset-1 bg-gradient-to-r from-blue-600/30 to-indigo-600/30 rounded-[1.2rem] blur-xl opacity-20 pointer-events-none"></div>
        <div class="relative bg-app-card border border-app-border rounded-xl overflow-hidden shadow-2xl">
            <div class="p-8 relative">
                <div class="flex justify-center mb-6">
                    <div class="w-12 h-12 flex items-center justify-center bg-white/[0.03] border border-app-border rounded-xl shadow-[0_0_15px_rgba(59,130,246,0.1)]">
                        <i class="fa-solid fa-layer-group text-xl text-blue-500"></i>
                    </div>
                </div>

                <div class="text-center mb-8">
                    <h2 class="text-xl font-semibold text-white tracking-tight">Root Authentication</h2>
                    <p class="text-xs text-zinc-500 font-mono mt-1">Credentials Required (admin@enterprise.io / nexus)</p>
                </div>

                <form id="authCore" class="space-y-4">
                    <div>
                        <input id="sysEmail" type="email" placeholder="admin@enterprise.io" class="w-full bg-black/50 border border-app-border text-white text-sm rounded-lg p-3 outline-none focus:border-blue-500 transition-all font-mono">
                    </div>
                    <div>
                        <input id="sysPass" type="password" placeholder="Key cipher..." class="w-full bg-black/50 border border-app-border text-white text-sm rounded-lg p-3 outline-none focus:border-blue-500 transition-all font-mono">
                    </div>
                    <button type="submit" id="btnSubmit" class="w-full py-3 bg-white text-black font-semibold text-sm rounded-lg hover:bg-zinc-200 transition-colors mt-2">
                        Unlock Protocol <i class="fa-solid fa-arrow-right-to-bracket ml-2 text-xs"></i>
                    </button>
                </form>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('authCore').addEventListener('submit', function(e) {
            e.preventDefault();
            const m = document.getElementById('sysEmail').value;
            const p = document.getElementById('sysPass').value;
            
            if (m === 'admin@enterprise.io' && p === 'nexus') {
                const btn = document.getElementById('btnSubmit');
                btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Authorizing';
                setTimeout(() => {
                    localStorage.setItem('nexus_auth', btoa('AUTH_SESSION_VALID'));
                    window.location.replace('dashboard.html');
                }, 800);
            } else {
                const err = document.getElementById('authErr');
                err.classList.remove('hidden'); err.classList.add('flex');
                setTimeout(()=> { err.classList.add('hidden'); err.classList.remove('flex'); }, 2000);
            }
        });
    </script>
</body>
</html>
