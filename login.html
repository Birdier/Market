<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Nexus Auth Gateway</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { theme: { extend: { fontFamily: { sans: ['Inter'], mono: ['JetBrains Mono'] }, colors: { base: '#000000', surface: '#0a0a0c', borderline: 'rgba(255,255,255,0.08)' } } } }
    </script>
</head>
<body class="bg-base text-zinc-300 font-sans min-h-screen flex items-center justify-center relative overflow-hidden">
    <a href="index.html" class="absolute top-6 left-8 text-xs text-zinc-500 hover:text-white transition flex items-center font-mono">
        <i class="fa-solid fa-arrow-left mr-2"></i> PUBLIC STOREFRONT
    </a>
    
    <div class="relative w-full max-w-[360px] z-10 px-4">
        <!-- Floating Backdrop -->
        <div class="absolute -inset-1 bg-gradient-to-r from-blue-600/30 to-purple-600/30 blur-[40px] pointer-events-none"></div>

        <div class="relative bg-surface border border-borderline rounded-2xl p-8 shadow-2xl backdrop-blur-xl">
            <div id="toast" class="absolute -top-12 left-0 w-full text-center py-2 bg-red-500/10 border border-red-500/20 text-red-500 text-xs font-mono font-bold uppercase rounded hidden"></div>
            
            <i class="fa-solid fa-terminal text-2xl text-blue-500 mb-6 drop-shadow-[0_0_15px_rgba(59,130,246,0.5)]"></i>
            <h2 class="text-xl text-white font-bold tracking-tight">System Node Authentication</h2>
            <p class="text-xs font-mono text-zinc-500 mt-1 mb-8 tracking-wide">SECURE PROTOCOL ENVIRONMENT</p>

            <form id="authForm" class="space-y-4">
                <div class="space-y-1">
                    <label class="text-[10px] uppercase font-bold tracking-widest text-zinc-400">Node Identifier / Email</label>
                    <input id="email" type="email" placeholder="admin@nexus.io" class="w-full bg-[#111] text-white text-sm font-mono p-3 rounded-lg border border-borderline outline-none focus:border-blue-500 transition">
                </div>
                <div class="space-y-1">
                    <label class="text-[10px] uppercase font-bold tracking-widest text-zinc-400">Security Key</label>
                    <input id="password" type="password" placeholder="•••••••" class="w-full bg-[#111] text-white text-sm font-mono p-3 rounded-lg border border-borderline outline-none focus:border-blue-500 transition">
                </div>
                <button type="submit" id="btn" class="w-full py-3 bg-white text-black font-semibold text-xs font-mono tracking-widest uppercase rounded-lg hover:bg-zinc-200 hover:scale-[1.02] transition shadow-[0_0_15px_rgba(255,255,255,0.2)] mt-2">Initialize Connect</button>
            </form>
        </div>
    </div>

    <script>
        document.getElementById('authForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const DB = JSON.parse(localStorage.getItem('NEXUS_DB')) || {};
            const userDb = DB.users || [];

            const inputEmail = document.getElementById('email').value.trim();
            const inputPass = document.getElementById('password').value.trim();
            const validUser = userDb.find(u => u.email === inputEmail && u.password === inputPass);

            if (validUser) {
                document.getElementById('btn').innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-2"></i> PIPELINING...';
                localStorage.setItem('auth_session', validUser.role);
                
                setTimeout(() => {
                    if (validUser.role === 'admin') window.location.href = 'admin.html';
                    else alert("Customer login detected. Accessing Store Data... (Route to User Dashboard disabled for admin testing demo)");
                }, 1000);
            } else {
                const toast = document.getElementById('toast');
                toast.innerHTML = "Authorization Rejected.";
                toast.classList.remove('hidden');
                setTimeout(() => toast.classList.add('hidden'), 2000);
            }
        });
    </script>
</body>
</html>
