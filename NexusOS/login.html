<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus | Administrator Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-black text-white font-sans min-h-screen flex items-center justify-center overflow-hidden">
    
    <!-- RETURN TO HOME PAGE BUTTON (Fixed Top Left) -->
    <a href="index.html" class="absolute top-6 left-6 z-50 flex items-center px-4 py-2 bg-[#111] hover:bg-white text-zinc-400 hover:text-black transition-colors rounded-lg font-mono text-[10px] uppercase font-bold tracking-widest border border-white/10 hover:border-white shadow-lg group">
        <i class="fa-solid fa-arrow-left mr-2 transform group-hover:-translate-x-1 transition-transform"></i> Storefront
    </a>

    <!-- Visual Backglow -->
    <div class="absolute inset-0 flex items-center justify-center pointer-events-none z-0">
        <div class="w-[500px] h-[300px] bg-blue-600/10 blur-[120px] rounded-full"></div>
    </div>

    <!-- Login Modal -->
    <div class="relative glass-panel rounded-2xl p-10 w-full max-w-sm animate-fade z-10 border border-white/10 shadow-2xl">
        <div id="error-toast" class="hidden mb-6 p-3 bg-red-900/30 border border-red-500/50 text-red-400 text-xs font-medium rounded-lg text-center shadow-lg">Authorization Route Rejected.</div>
        
        <div class="flex items-center mb-6">
            <div class="w-8 h-8 rounded-md bg-blue-600 flex justify-center items-center mr-3 shadow-[0_0_15px_rgba(37,99,235,0.4)]"><i class="fa-solid fa-cube text-white text-sm"></i></div>
            <h2 class="text-xl font-bold tracking-tight text-white">Nexus Workspace</h2>
        </div>
        
        <p class="text-sm text-zinc-400 mb-8 font-light">Provide operational credentials to bypass security.</p>

        <form id="auth-form" class="space-y-4">
            <div>
                <label class="block text-[10px] uppercase tracking-widest font-mono font-bold text-zinc-500 mb-2">Identifier ID</label>
                <input id="in-email" type="email" placeholder="admin@nexus.io" class="w-full bg-[#050505] border border-white/10 px-4 py-3 rounded-lg text-sm text-white font-sans focus:border-blue-500 outline-none transition shadow-inner" required>
            </div>
            <div>
                <label class="block text-[10px] uppercase tracking-widest font-mono font-bold text-zinc-500 mb-2 mt-4 flex justify-between"><span>Encrypted Pass</span> <a href="#" class="text-blue-500 hover:text-blue-400">Recovery?</a></label>
                <input id="in-key" type="password" placeholder="••••••••" class="w-full bg-[#050505] border border-white/10 px-4 py-3 rounded-lg text-sm text-white focus:border-blue-500 outline-none transition shadow-inner" required>
            </div>
            <button type="submit" id="submit-btn" class="w-full bg-white text-black hover:bg-zinc-200 transition-colors uppercase font-mono tracking-widest font-bold text-[10px] py-3.5 rounded-lg mt-6 active:scale-95 shadow">
                Establish Connection
            </button>
        </form>
    </div>

    <script src="js/db.js"></script>
    <script>
        document.getElementById('auth-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            
            if (document.getElementById('in-email').value === 'admin@nexus.io' && document.getElementById('in-key').value === 'admin') {
                btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-2 text-zinc-600"></i> Linking Database';
                localStorage.setItem('auth_session', 'admin_access');
                setTimeout(() => window.location.href = 'admin.html', 800);
            } else {
                document.getElementById('error-toast').classList.remove('hidden');
                setTimeout(() => document.getElementById('error-toast').classList.add('hidden'), 2500);
            }
        });
    </script>
</body>
</html>
