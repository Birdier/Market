<!-- admin.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>NEXUS | Admin OS</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Link our isolated files -->
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <script>
        tailwind.config = { theme: { extend: { fontFamily: { sans: ['Inter'], mono: ['JetBrains Mono'] } } } }
    </script>
</head>
<body class="bg-[#020202] text-zinc-300 font-sans h-screen flex overflow-hidden">

    <!-- GLOBAL SIDEBAR -->
    <aside class="w-[260px] border-r border-white/5 bg-[#050505] flex flex-col shrink-0 shadow-2xl relative z-20">
        <div class="h-16 flex items-center px-6 border-b border-white/5 bg-black">
            <i class="fa-solid fa-satellite-dish text-blue-500 mr-3"></i>
            <h1 class="text-white font-bold tracking-widest font-mono text-xs uppercase shadow-[0_0_10px_rgba(59,130,246,0.5)]">Nexus Admin</h1>
        </div>

        <nav class="flex-1 py-6 px-4 space-y-2">
            <!-- Navigation items bound by ID -->
            <button id="btn-dash" class="w-full flex items-center bg-white/10 text-white border border-white/5 rounded-lg p-3 text-[11px] font-mono font-bold uppercase transition tracking-wider">
                <i class="fa-solid fa-chart-line mr-3 text-blue-400"></i> Analytics
            </button>
            <button id="btn-inventory" class="w-full flex items-center bg-transparent text-zinc-500 hover:text-white hover:bg-white/5 border border-transparent rounded-lg p-3 text-[11px] font-mono font-bold uppercase transition tracking-wider">
                <i class="fa-solid fa-server mr-3"></i> Hardware DB
            </button>
        </nav>

        <div class="p-4 border-t border-white/5 bg-black/40">
            <button id="btn-logout" class="w-full py-2.5 text-red-500 hover:text-white bg-red-900/10 hover:bg-red-600 border border-red-500/20 text-[10px] font-mono font-bold tracking-widest uppercase rounded-lg transition shadow-lg shadow-red-500/5">
                <i class="fa-solid fa-power-off mr-2"></i> Lock Route
            </button>
        </div>
    </aside>

    <!-- OS CONTAINER LAYER -->
    <main class="flex-1 h-full relative z-0 overflow-hidden bg-[radial-gradient(ellipse_at_top,_rgba(37,99,235,0.06),_transparent_60%)] flex flex-col">
        
        <!-- PANE 1: LEDGER / DASHBOARD -->
        <section id="pane-dash" class="pane flex-1 w-full max-w-6xl mx-auto p-8 overflow-y-auto custom-scrollbar animate-fade block">
            <header class="border-b border-white/10 pb-6 mb-8 flex justify-between items-end">
                <div>
                    <h2 class="text-3xl font-bold text-white tracking-tight font-sans">Settlement Analytics</h2>
                    <p class="font-mono text-[10px] text-zinc-500 mt-2 uppercase tracking-[0.2em]">Cross-Node Revenue & Database Telemetry</p>
                </div>
            </header>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
                 <!-- Live Math Output Elements -->
                 <div class="glass-panel rounded-2xl p-6 relative overflow-hidden group hover:border-blue-500/30 transition">
                     <p class="text-[9px] uppercase font-mono tracking-[0.2em] text-zinc-500 font-bold mb-2">Net Pipeline Volume</p>
                     <p id="kpi-rev" class="text-4xl text-white font-bold tracking-tighter">$0.00</p>
                     <div class="absolute bottom-0 left-0 h-1 bg-blue-600 w-full opacity-50"></div>
                 </div>
                 <div class="glass-panel rounded-2xl p-6 relative group hover:border-blue-500/30 transition">
                     <p class="text-[9px] uppercase font-mono tracking-[0.2em] text-zinc-500 font-bold mb-2">Processed Sales Routings</p>
                     <p id="kpi-ords" class="text-4xl text-white font-bold tracking-tighter">0 Node</p>
                 </div>
            </div>

            <!-- Visualization Engine -->
            <div class="grid grid-cols-1 lg:grid-cols-5 gap-6 min-h-[400px]">
                <div class="glass-panel lg:col-span-3 rounded-2xl p-6 flex flex-col relative z-10 shadow-2xl">
                    <h3 class="text-xs font-mono font-bold uppercase tracking-wider text-white border-b border-white/10 pb-4 mb-4 flex justify-between">Financial Graphic Array <i class="fa-solid fa-code-merge text-zinc-600"></i></h3>
                    <div class="relative flex-1"><canvas id="revenueGraphCanvas"></canvas></div>
                </div>

                <div class="bg-black/80 lg:col-span-2 border border-white/10 rounded-2xl flex flex-col h-[400px] overflow-hidden">
                    <h3 class="p-5 text-[10px] font-mono font-bold text-zinc-400 uppercase tracking-widest border-b border-white/10 bg-[#020202] shadow">Validated Orders Database</h3>
                    <div id="render-recent-orders" class="flex-1 overflow-y-auto custom-scrollbar p-3 space-y-2">
                        <!-- Items rendered by javascript -->
                    </div>
                </div>
            </div>
        </section>

        <!-- PANE 2: INVENTORY GENERATOR -->
        <section id="pane-inventory" class="pane flex-1 w-full max-w-6xl mx-auto p-8 overflow-y-auto custom-scrollbar hidden-pane animate-fade">
            <h2 class="text-2xl font-bold text-white border-b border-white/10 pb-6 mb-8 tracking-tight">Enterprise Asset Catalog</h2>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-8 flex-1">
                 <!-- Creator Object Array -->
                 <div class="glass-panel rounded-2xl p-6 h-fit border-t-[3px] border-t-white/20 relative shadow-2xl">
                     <form id="add-prod-form" class="space-y-4">
                          <label class="block text-zinc-500 font-bold uppercase text-[9px] font-mono tracking-widest mt-2 -mb-2">Hardware Unit ID (Name)</label>
                          <input id="input-prod-nm" class="w-full bg-[#08080a] border border-white/10 text-white px-3 py-2.5 rounded-lg outline-none focus:border-blue-500 text-sm font-sans" required>

                          <label class="block text-zinc-500 font-bold uppercase text-[9px] font-mono tracking-widest mt-4 -mb-2">Specification Sheet Details</label>
                          <textarea id="input-prod-dsc" class="w-full bg-[#08080a] border border-white/10 text-zinc-300 px-3 py-2 rounded-lg outline-none focus:border-blue-500 text-sm h-20 resize-none font-sans" required></textarea>

                          <label class="block text-zinc-500 font-bold uppercase text-[9px] font-mono tracking-widest mt-4 -mb-2">Wholesale Cost Target</label>
                          <input id="input-prod-prc" type="number" step="0.01" class="w-full bg-[#08080a] border border-white/10 text-blue-400 px-3 py-2.5 rounded-lg outline-none focus:border-blue-500 text-sm font-bold font-mono" value="0.00" required>

                          <button type="submit" id="submit-prod-btn" class="w-full bg-white hover:bg-zinc-200 text-black uppercase font-bold text-[10px] tracking-[0.2em] font-mono py-3 rounded-lg shadow-lg active:scale-95 transition-all mt-6">
                              Push Live Block Build
                          </button>
                     </form>
                 </div>
                 
                 <!-- Reader Screen String Display List-->
                 <div class="bg-black/80 border border-white/10 rounded-2xl flex flex-col max-h-[600px] overflow-hidden">
                      <div class="p-5 border-b border-white/10 bg-[#050505]">
                           <h4 class="text-[10px] text-zinc-400 font-bold font-mono tracking-[0.2em] uppercase">Registered Market Nodes</h4>
                      </div>
                      <div id="render-prods-list" class="flex-1 overflow-y-auto custom-scrollbar p-4 space-y-2"></div>
                 </div>
            </div>
        </section>

    </main>

    <!-- Connect our custom script libraries -->
    <script src="js/db.js"></script>
    <script src="js/admin.js"></script>

</body>
</html>
